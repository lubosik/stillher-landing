<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="StillHer Foundation mark">
  <!--
    Three-generation silhouette:
    Left  — older woman (stooped, ~65px tall, supported)
    Center — younger woman (upright, ~80px tall, anchor)
    Right  — child on younger woman's shoulders (~28px above shoulders)
  -->
  <g id="mark" fill="#1A1410">
    <!-- ═══ OLDER WOMAN (left) ═══ -->
    <!-- Head — slightly forward-tilted -->
    <ellipse cx="30" cy="28" rx="7.5" ry="8.5" transform="rotate(-8, 30, 28)"/>
    <!-- Body — stooped, wider hips -->
    <path d="
      M 22 36
      C 19 40 17 48 18 56
      C 18 62 20 67 22 70
      C 23 72 26 74 28 74
      C 30 74 32 73 33 71
      C 36 67 37 60 36 53
      C 37 50 38 46 37 42
      C 36 39 34 37 32 36
      Z
    "/>
    <!-- Extended arm toward younger woman -->
    <path d="
      M 34 44
      C 38 42 43 41 47 42
      L 47 45
      C 44 44 39 45 35 47
      Z
    "/>
    <!-- Leg gap / skirt flow -->
    <path d="
      M 22 68
      C 20 72 19 78 20 84
      C 21 88 24 90 26 90
      L 28 90
      C 28 86 27 80 27 76
      Z
    "/>
    <path d="
      M 30 70
      C 30 74 30 80 31 84
      C 31 88 33 90 35 90
      L 37 90
      C 36 86 35 78 34 74
      Z
    "/>

    <!-- ═══ YOUNGER WOMAN (center, tallest) ═══ -->
    <!-- Head — upright -->
    <circle cx="56" cy="17" r="9"/>
    <!-- Neck -->
    <rect x="53" y="25" width="6" height="5" rx="2"/>
    <!-- Torso — strong, upright, feminine -->
    <path d="
      M 46 30
      C 44 35 43 44 44 52
      C 45 58 47 63 50 66
      C 51 68 53 69 56 69
      C 59 69 61 68 62 66
      C 65 63 67 58 68 52
      C 69 44 68 35 66 30
      C 63 28 60 27 56 27
      C 52 27 49 28 46 30
      Z
    "/>
    <!-- Left arm extended toward / around older woman -->
    <path d="
      M 46 36
      C 42 38 36 40 32 41
      L 32 45
      C 36 44 42 42 46 40
      Z
    "/>
    <!-- Right arm raised to support child on shoulders -->
    <path d="
      M 66 32
      C 69 28 71 22 72 16
      L 75 17
      C 74 24 72 30 69 35
      Z
    "/>
    <!-- Legs -->
    <path d="
      M 50 67
      C 49 73 48 80 48 86
      C 48 89 50 91 52 91
      L 54 91
      C 54 87 54 79 54 74
      Z
    "/>
    <path d="
      M 60 67
      C 62 73 63 80 63 86
      C 63 89 61 91 59 91
      L 57 91
      C 57 87 57 79 57 74
      Z
    "/>

    <!-- ═══ CHILD (on shoulders of younger woman) ═══ -->
    <!-- Head — larger head-to-body ratio = clearly a child -->
    <circle cx="68" cy="8" r="8.5"/>
    <!-- Body — short torso on shoulders -->
    <path d="
      M 62 16
      C 61 19 61 24 62 28
      C 63 30 65 31 68 31
      C 71 31 73 30 74 28
      C 75 24 75 19 74 16
      C 72 15 70 15 68 15
      C 66 15 64 15 62 16
      Z
    "/>
    <!-- Child left leg dangling -->
    <path d="
      M 63 29
      C 62 32 61 35 61 38
      C 61 39 62 40 63 40
      L 64 40
      C 65 37 65 33 65 30
      Z
    "/>
    <!-- Child right leg dangling -->
    <path d="
      M 73 29
      C 74 32 75 35 75 38
      C 75 39 74 40 73 40
      L 72 40
      C 71 37 71 33 71 30
      Z
    "/>
    <!-- Child left arm outward (balance/joy) -->
    <path d="
      M 61 18
      C 57 17 53 17 51 19
      L 51 22
      C 53 21 57 21 61 22
      Z
    "/>
    <!-- Child right arm outward -->
    <path d="
      M 75 18
      C 79 17 83 17 85 19
      L 85 22
      C 83 21 79 21 75 22
      Z
    "/>
  </g>
</svg>
